name: ParaBank Regression Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows you to manually trigger the tests with a button click

jobs:
  test:
    timeout-minutes: 5
    runs-on: ubuntu-latest

    steps:
    - name: Checkout local repository code
      uses: actions/checkout@v4

    - name: Set up Node.js environment
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install project dependencies
      run: npm ci

    - name: Install Playwright OS dependencies and Browsers
      run: npx playwright install --with-deps

    - name: Execute Full Regression Suite
      run: npm run test:all

    - name: Archive Playwright HTML Test Reports
      uses: actions/upload-artifact@v4
      if: ${{ ! cancelled() }} # Uploads reports even if some tests fail
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
